name: Test

on:
  push:
    branches: [ "**" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-setup:
    name: Go setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Go mod download
        run: go mod download

      - name: Go mod download tools
        working-directory: .github/workflows
        run: go mod download

  go-deps-check:
    name: Go dependency check
    runs-on: ubuntu-latest
    needs:
      - go-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Go mod tidy
        run: go mod tidy && git diff --exit-code

      - name: Go mod verify
        run: go mod verify

      - name: Install govulncheck
        working-directory: .github/workflows
        run: go install golang.org/x/vuln/cmd/govulncheck

      - name: Run govulncheck
        run: govulncheck -test ./...

  go-gen-check:
    name: Go generate check
    runs-on: ubuntu-latest
    needs:
      - go-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Go generate
        run: go generate ./... && git diff --exit-code

  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    needs:
      - go-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Run vet with all constraints
        run: go vet -tags integration,integration_sysinit ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: "v1.64"
          args: "--build-tags integration,integration_sysinit ./..."

  reuse-lint:
    name: FSFE REUSE Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v5

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  goreleaser-lint:
    name: Goreleaser check
    runs-on: ubuntu-latest
    needs:
      - go-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/aibor/virtrun-test:latest
    env:
      VIRTRUN_ARGS: "-kernel /kernel/${{ matrix.arch }}/vmlinuz-virt \
                     -transport pci \
                     -memory 128 \
                     -verbose \
                     -debug"
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run go generate testdata
        run: go generate -tags testdata ./...

      - name: Run go generate integration tests
        env:
          GOARCH: ${{ matrix.arch }}
        run: go generate -tags integration ./...

      - name: Run tests
        env:
          SKIP: ${{ matrix.arch != 'amd64' && 'TestIntegration/linked' }}
        run: |
          go test -v \
            -tags integration \
            -skip "${{ env.SKIP }}" \
            -covermode atomic \
            -coverprofile coverage.txt \
            ./internal/... \
            | go-junit-report -set-exit-code -iocopy -out junit-report.xml

      - name: Run go-cobertura
        run: gocover-cobertura -by-files < coverage.txt > coverage.xml

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration-${{ matrix.arch }}
          path: junit-report.xml
          retention-days: 2

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: ${{ matrix.arch == 'amd64' }}
        with:
          name: go-coverage
          path: coverage*

  integration-tests-sysinit:
    name: Run integration tests of sysinit package and binaries
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/aibor/virtrun-test:latest
    env:
      VIRTRUN_ARGS: "-kernel /kernel/${{ matrix.arch }}/vmlinuz-virt \
                     -addModule /kernel/${{ matrix.arch }}/tun.ko.gz \
                     -addModule /kernel/${{ matrix.arch }}/veth.ko.gz \
                     -transport pci \
                     -standalone \
                     -verbose \
                     -debug"
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build virtrun
        run: go build -buildvcs=false -o /virtrun .

      - name: Run sysinit test
        env:
          GOARCH: "${{ matrix.arch }}"
        run: |
          go test -v \
            -tags integration_sysinit \
            -exec /virtrun \
            -covermode atomic \
            -coverprofile coverage.txt \
            -coverpkg ./sysinit \
            ./sysinit \
            ./internal/virtrun/init/cmd \
            -testModules tun,veth \
            | go-junit-report -set-exit-code -iocopy -out junit-report-sysinit.xml

      - name: Run go-cobertura
        run: gocover-cobertura -by-files < coverage.txt > coverage.xml

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration-sysinit-${{ matrix.arch }}
          path: junit-report*.xml
          retention-days: 2

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: ${{ matrix.arch == 'amd64' }}
        with:
          name: go-coverage-sysinit
          path: coverage*

  results:
    if: always()
    runs-on: ubuntu-latest
    name: Test Results
    needs:
      - go-deps-check
      - go-gen-check
      - go-lint
      - integration-tests
      - integration-tests-sysinit
      - reuse-lint
      - goreleaser-lint
    steps:
    - run: exit 1
      if: |
        contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
